<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Bluey's SAT Bingo - Hint Edition</title>
    <style>
        :root {
            --bluey-light: #93D5F6;
            --bluey-deep: #1B3F8B;
            --bingo-orange: #F6A34A;
            --bluey-cream: #FFF9E5;
            --bluey-shadow: #88B7D5;
            --error-red: #E74C3C;
            --hint-green: #2ECC71;
        }
        body {
            font-family: sans-serif;
            background-color: var(--bluey-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            color: var(--bluey-deep);

background-image: url('background.png');
    background-size: cover;          /* Scales image to fill the screen */
    background-position: center;     /* Keeps the hill/houses centered */
    background-attachment: fixed;    /* Keeps the background still while scrolling */
    background-repeat: no-repeat;    /* Prevents the image from tiling */
    margin: 0;
    padding: 0;

        }
        h1 {
            font-size: 3rem;
            color: white;
            text-shadow: 4px 4px var(--bluey-deep);
            margin-bottom: 20px;
        }
        .game-container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1250px;
            align-items: flex-start;
        }
        .caller-card {
	    background-color: rgba(255, 255, 255, 0.8); /* White with 80% transparency */	
            padding: 30px;
            border-radius: 30px;
            border: 10px solid var(--bingo-orange);
            width: 320px;
            text-align: center;
            display: flex;
            flex-direction: column;
            order: 1;
        }
        .caller-card h2 { color: var(--bluey-deep); margin-top: 0; }
        #feedback { 
            font-weight: bold; 
            min-height: 28px; 
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        .error-msg { color: var(--error-red); }
        .hint-msg { color: var(--hint-green); }
        
        #pos-display { 
            font-weight: bold; 
            font-size: 1.1rem; 
            text-transform: lowercase; 
            color: var(--bluey-deep);
        }
        #definition-display { 
            font-size: 1.5rem; 
            font-weight: bold; 
            min-height: 90px; 
            margin: 15px 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #reveal-area { 
            display: none; 
            border-top: 3px dashed var(--bluey-light); 
            padding-top: 10px;
            margin-top: 10px;
        }
        #reveal-word { 
            font-size: 1.6rem; 
            color: var(--bingo-orange); 
            font-weight: 900; 
            display: block;
            padding-top: 10px;
            margin-bottom: 10px;
        }
        #sentence-display { 
            font-style: italic; 
            color: #444; 
            line-height: 1.3;
            font-size: 1.0rem;
        }
        .bingo-board {
            display: grid;
            grid-template-columns: repeat(5, 125px);
            grid-template-rows: repeat(5, 90px);
            gap: 10px;
            //background: var(--bluey-deep);
	    background-color: rgba(147, 213, 246, 0.8);
            padding: 10px;
            border-radius: 20px;
            border: 12px solid var(--bluey-cream);
            order: 2;
        }
        .tile {
	    background-color: rgba(255, 255, 255, 0.85);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 5px;
            font-size: 1.0rem;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            word-break: break-word;
            transition: all 0.2s;
            border: 4px solid transparent;
            line-height: 1.0;
        }
        .tile:hover:not(.marked) { transform: scale(1.05); background: #fdfdfd; }
        .tile.marked { 
            background: var(--bingo-orange); 
            color: white; 
        }
        .tile.winning-tile { 
            border-color: white; 
            transform: scale(1.1); 
            box-shadow: 0 0 25px white;
            z-index: 10;
        }
        .tile.free { 
            background: var(--bingo-orange); 
            color: var(--bluey-cream);
            font-size: 1.3rem;
        }
        .button-group {
            margin-top: auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding-top: 25px;
        }
        .button-group #next-btn { grid-column: span 2; }
        
        button {
            padding: 14px 18px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 0 rgba(0,0,0,0.15);
            transition: all 0.1s;
            font-family: inherit;
            font-size: 1rem;
        }
        button:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,0.15); }
        #next-btn { background: var(--bingo-orange); color: white; }
        #hint-btn { background: var(--hint-green); color: white; }
        #reveal-btn { background: var(--bluey-light); color: var(--bluey-deep); }
        #reset-btn { 
            background: var(--hint-green); 
            color: var(--bluey-cream); 
            margin-top: 10px; 
            font-size: 1.2rem;
            padding: 18px 30px;
        }
    </style>
</head>

    <h1>SAT Vocab BINGO!</h1>

        <div id="board" class="bingo-board"></div>
    </div>

egation", "Part of Speech": "n.", "Definition": "denial of comfort to oneself", "Sentence Example": "The holy man slept on the floor, took only cold showers, and generally followed other practices of <strong>abnegation</strong> ."}, {"Word": "abort", "Part of Speech": "v.", "Definition": "to give up on a half-finished project or effort", "Sentence Example": "After they ran out of food, the men, attempting to jump rope around the world, had to <strong>abort</strong> and go home."}, {"Word": "abrogate", "Part of Speech": "v.", "Definition": "to abolish, usually by authority", "Sentence Example": "The Bill of Rights assures that the government cannot <strong>abrogate</strong> our right to a free press."}, {"Word": "abscond", "Part of Speech": "v.", "Definition": "to sneak away and hide", "Sentence Example": "In the confusion, the super-spy <strong>abscond</strong>ed into the night with the secret plans."}, {"Word": "absolution", "Part of Speech": "n.", "Definition": "freedom from blame, guilt, sin", "Sentence Example": "Once all the facts were known, the jury gave Angela <strong>absolution</strong> by giving a verdict of not guilty."}, {"Word": "abstain", "Part of Speech": "v.", "Definition": "to freely choose not to commit an action", "Sentence Example": "Everyone demanded that Angus put on the kilt, but he did not want to do it and <strong>abstain</strong>ed ."}, {"Word": "abstruse", "Part of Speech": "adj.", "Definition": "hard to comprehend", "Sentence Example": "Everyone else in the class understood geometry easily, but John found the subject <strong>abstruse</strong> ."}, {"Word": "accede", "Part of Speech": "v.", "Definition": "to agree", "Sentence Example": "When the class asked the teacher whether they could play baseball instead of learn grammar they expected him to refuse, but instead he <strong>accede</strong>d to their request."}, {"Word": "accentuate", "Part of Speech": "v.", "Definition": "to stress, highlight", "Sentence Example": "Psychologists agree that those people who are happiest <strong>accentuate</strong> the positive in life."}, {"Word": "accessible", "Part of Speech": "adj.", "Definition": "obtainable, reachable", "Sentence Example": "After studying with SparkNotes and getting a great score on the SAT, Marlena happily realized that her goal of getting into an Ivy-League college was <strong>accessible</strong> ."}, {"Word": "acclaim", "Part of Speech": "n.", "Definition": "high praise", "Sentence Example": "Greg's excellent poem won the <strong>acclaim</strong> of his friends."}, {"Word": "accolade", "Part of Speech": "n.", "Definition": "high praise, special distinction", "Sentence Example": "Everyone offered <strong>accolade</strong>s to Sam after he won the Noble Prize."}, {"Word": "accommodating", "Part of Speech": "adj.", "Definition": "helpful, obliging, polite", "Sentence Example": "Though the apartment was not big enough for three people, Arnold, Mark, and Zebulon were all friends and were <strong>accommodating</strong> to each other."}, {"Word": "accord", "Part of Speech": "n.", "Definition": "an agreement", "Sentence Example": "After much negotiating, England and Iceland finally came to a mutually beneficial <strong>accord</strong> about fishing rights off the cost of Greenland."}, {"Word": "accost", "Part of Speech": "v.", "Definition": "to confront verbally", "Sentence Example": "Though Antoinette was normally quite calm, when the waiter spilled soup on her for the fourth time in 15 minutes she stood up and <strong>accost</strong>ed the man."}, {"Word": "accretion", "Part of Speech": "n.", "Definition": "slow growth in size or amount", "Sentence Example": "Stalactites are formed by the <strong>accretion</strong> of minerals from the roofs of caves."}, {"Word": "acerbic", "Part of Speech": "adj.", "Definition": "biting, bitter in tone or taste", "Sentence Example": "Jill became extremely <strong>acerbic</strong> and began to cruelly make fun of all her friends."}, {"Word": "acquiesce", "Part of Speech": "v.", "Definition": "to agree without protesting", "Sentence Example": "Though Mr. Correlli wanted to stay outside and work in his garage, when his wife told him that he had better come in to dinner, he <strong>acquiesce</strong>d to her demands."}, {"Word": "acrimony", "Part of Speech": "n.", "Definition": "bitterness, discord", "Sentence Example": "Though they vowed that no girl would ever come between them, Biff and Trevor could not keep <strong>acrimony</strong> from overwhelming their friendship after they both fell in love with the lovely Teresa."}, {"Word": "acumen", "Part of Speech": "n.", "Definition": "keen insight", "Sentence Example": "Because of his mathematical <strong>acumen</strong> , Larry was able to figure out in minutes problems that took other students hours."}, {"Word": "adamant", "Part of Speech": "adj.", "Definition": "impervious, immovable, unyielding", "Sentence Example": "Though public pressure was intense, the President remained <strong>adamant</strong> about his proposal."}, {"Word": "adept", "Part of Speech": "adj.", "Definition": "extremely skilled", "Sentence Example": "Tarzan was <strong>adept</strong> at jumping from tree to tree like a monkey."}, {"Word": "admonish", "Part of Speech": "v.", "Definition": "to caution, criticize, reprove", "Sentence Example": "Joe's mother <strong>admonish</strong>ed him not to ruin his appetite by eating cookies before dinner."}, {"Word": "adorn", "Part of Speech": "v.", "Definition": "to decorate", "Sentence Example": "We <strong>adorn</strong>ed the tree with ornaments."}, {"Word": "adroit", "Part of Speech": "adj.", "Definition": "skillful, dexterous", "Sentence Example": "The <strong>adroit</strong> thief could pick someone's pocket without attracting notice."}, {"Word": "adulation", "Part of Speech": "n.", "Definition": "extreme praise", "Sentence Example": "Though the book was pretty good, Marcy did not believe it deserved the <strong>adulation</strong> it received."}, {"Word": "adumbrate", "Part of Speech": "v.", "Definition": "to sketch out in a vague way", "Sentence Example": "The coach <strong>adumbrate</strong>d a game plan, but none of the players knew precisely what to do."}, {"Word": "adverse", "Part of Speech": "adj.", "Definition": "antagonistic, unfavorable, dangerous", "Sentence Example": "Because of <strong>adverse</strong> conditions, the hikers decided to give up trying to climb the mountain."}, {"Word": "aerial", "Part of Speech": "adj.", "Definition": "somehow related to the air", "Sentence Example": "We watched as the fighter planes conducted <strong>aerial</strong> maneuvers."}, {"Word": "aesthetic", "Part of Speech": "adj.", "Definition": "artistic, related to the appreciation of beauty", "Sentence Example": "We hired Susan as our interior decorator because she has such a fine <strong>aesthetic</strong> sense."}, {"Word": "affable", "Part of Speech": "adj.", "Definition": "friendly, amiable", "Sentence Example": "People like to be around George because he is so <strong>affable</strong> and good-natured."}, {"Word": "affront", "Part of Speech": "n.", "Definition": "an insult", "Sentence Example": "Bernardo was very touchy, and took any slight as an <strong>affront</strong> to his honor."}, {"Word": "aggrandize", "Part of Speech": "v.", "Definition": "to increase or make greater", "Sentence Example": "Joseph always dropped the names of the famous people his father knew as a way to <strong>aggrandize</strong> his personal stature."}, {"Word": "aggrieved", "Part of Speech": "adj.", "Definition": "distressed, wronged, injured", "Sentence Example": "The foreman mercilessly overworked his <strong>aggrieved</strong> employees."}, {"Word": "agile", "Part of Speech": "adj.", "Definition": "quick, nimble", "Sentence Example": "The dogs were too slow to catch the <strong>agile</strong> rabbit."}, {"Word": "agnostic", "Part of Speech": "adj.", "Definition": "believing that the existence of God cannot be proven or disproven", "Sentence Example": "Joey's parents are very religious, but he is <strong>agnostic</strong> ."}, {"Word": "agriculture", "Part of Speech": "n.", "Definition": "farming", "Sentence Example": "It was a huge step in the progress of civilization when tribes left hunting and gathering and began to develop more sustainable methods of obtaining food, such as <strong>agriculture</strong> ."}, {"Word": "aisle", "Part of Speech": "n.", "Definition": "a passageway between rows of seats", "Sentence Example": "Once we got inside the stadium we walked down the <strong>aisle</strong> to our seats."}, {"Word": "alacrity", "Part of Speech": "n.", "Definition": "eagerness, speed", "Sentence Example": "For some reason, Chuck loved to help his mother whenever he could, so when his mother asked him to set the table he did so with <strong>alacrity</strong> ."}, {"Word": "alias", "Part of Speech": "n.", "Definition": "a false name or identity", "Sentence Example": "He snuck past the guards by using an <strong>alias</strong> and fake ID."}, {"Word": "allay", "Part of Speech": "v.", "Definition": "to soothe, ease", "Sentence Example": "The chairman of the Federal Reserve gave a speech to try to <strong>allay</strong> investors' fears about an economic downturn."}, {"Word": "allege", "Part of Speech": "v.", "Definition": "to assert, usually without proof", "Sentence Example": "The policeman had <strong>allege</strong>d that Marshall committed the crime, but after the investigation turned up no evidence, Marshall was set free."}, {"Word": "alleviate", "Part of Speech": "v.", "Definition": "to relieve, make more bearable", "Sentence Example": "This drug will <strong>alleviate</strong> the symptoms of the terrible disease, but only for a while."}, {"Word": "allocate", "Part of Speech": "v.", "Definition": "to distribute, set aside", "Sentence Example": "The Mayor <strong>allocate</strong>d 30 percent of the funds for improving the town's schools."}, {"Word": "aloof", "Part of Speech": "adj.", "Definition": "reserved, distant", "Sentence Example": "The scientist could sometimes seem <strong>aloof</strong> , as if he didn't care about his friends or family, but really he was just thinking about quantum mechanics."}, {"Word": "altercation", "Part of Speech": "n.", "Definition": "a dispute, fight", "Sentence Example": "Jason and Lionel blamed one another for the car accident, leading to an <strong>altercation</strong> ."}, {"Word": "amalgamate", "Part of Speech": "v.", "Definition": "to bring together, unite", "Sentence Example": "Because of his great charisma, the presidential candidate was able to <strong>amalgamate</strong> all democrats and republicans under his banner."}, {"Word": "ambiguous", "Part of Speech": "adj.", "Definition": "uncertain, variably interpretable", "Sentence Example": "Some people think Caesar married Cleopatra for her power, others believe he was charmed by her beauty. His actual reasons are <strong>ambiguous</strong> ."}, {"Word": "ambivalent", "Part of Speech": "adj.", "Definition": "having opposing feelings", "Sentence Example": "My feelings about Calvin are <strong>ambivalent</strong> because on one hand he is a loyal friend, but on the other, he is a cruel and vicious thief."}, {"Word": "ameliorate", "Part of Speech": "v.", "Definition": "to improve", "Sentence Example": "The tense situation was <strong>ameliorate</strong>d when Sam proposed a solution everyone could agree upon."}, {"Word": "amenable", "Part of Speech": "adj.", "Definition": "willing, compliant", "Sentence Example": "Our father was <strong>amenable</strong> when we asked him to drive us to the farm so we could go apple picking."}, {"Word": "amenity", "Part of Speech": "n.", "Definition": "an item that increases comfort", "Sentence Example": "Bill Gates's house is stocked with so many amenities , he never has to do anything for himself."}, {"Word": "amiable", "Part of Speech": "adj.", "Definition": "friendly", "Sentence Example": "An <strong>amiable</strong> fellow, Harry got along with just about everyone."}, {"Word": "amicable", "Part of Speech": "adj.", "Definition": "friendly", "Sentence Example": "Claudia and Jimmy got divorced, but amicably and without hard feelings."}, {"Word": "amorous", "Part of Speech": "adj.", "Definition": "showing love, particularly sexual", "Sentence Example": "Whenever Albert saw Mariah wear her slinky red dress, he began to feel quite <strong>amorous</strong> ."}, {"Word": "amorphous", "Part of Speech": "adj.", "Definition": "without definite shape or type", "Sentence Example": "The effort was doomed from the start, because the reasons behind it were so <strong>amorphous</strong> and hard to pin down."}, {"Word": "anachronistic", "Part of Speech": "adj.", "Definition": "being out of correct chronological order", "Sentence Example": "In this book you're writing, you say that the Pyramids were built after the Titanic sank, which is <strong>anachronistic</strong> ."}, {"Word": "analgesic", "Part of Speech": "n.", "Definition": "something that reduces pain", "Sentence Example": "Put this <strong>analgesic</strong> on the wound so that the poor man at least feels a little better."}, {"Word": "analogous", "Part of Speech": "adj.", "Definition": "similar to, so that an analogy can be drawn", "Sentence Example": "Though they are unrelated genetically, the bone structure of whales and fish is quite <strong>analogous</strong> ."}, {"Word": "anarchist", "Part of Speech": "n.", "Definition": "one who wants to eliminate all government", "Sentence Example": "An <strong>anarchist</strong> , Carmine wanted to dissolve every government everywhere."}, {"Word": "anathema", "Part of Speech": "n.", "Definition": "a cursed, detested person", "Sentence Example": "I never want to see that murderer. He is an <strong>anathema</strong> to me."}, {"Word": "anecdote", "Part of Speech": "n.", "Definition": "a short, humorous account", "Sentence Example": "After dinner, Marlon told an <strong>anecdote</strong> about the time he got         let callQueue = [];
        let tiles = [];
        let currentCall = null;
        let gameWon = false;
        
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playRollSound() {
            const duration = 0.3;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + duration);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        function playErrorSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

        function playWinSound() {
            const notes = [523.25, 659.25, 783.99, 1046.50];
            notes.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + (i * 0.1));
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime + (i * 0.1));
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + (i * 0.1) + 0.5);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime + (i * 0.1));
                osc.stop(audioCtx.currentTime + (i * 0.1) + 0.5);
            });
        }

        function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

        function initGame() {
            const boardElement = document.getElementById('board');
            boardElement.innerHTML = '';
            gameWon = false;
            currentCall = null;
            
            const sessionWords = shuffle([...allVocab]).slice(0, 24);
            callQueue = shuffle([...sessionWords]);
            
            const displayWords = [...sessionWords];
            displayWords.splice(12, 0, {Word: 'FREE SPACE', isFree: true});

            tiles = displayWords.map((item, i) => {
                const tile = document.createElement('div');
                tile.className = 'tile' + (item.isFree ? ' free marked' : '');
                tile.innerText = item.Word;
                tile.onclick = () => {
                    initAudio();
                    validateSelection(tile, item.Word, item.isFree);
                };
                boardElement.appendChild(tile);
                return tile;
            });

            resetDisplay();
        }

        function validateSelection(tile, word, isFree) {
            if (isFree || tile.classList.contains('marked')) return;
            
            if (!currentCall) {
                const fb = document.getElementById('feedback');
                fb.innerText = "Click 'Next Call' first!";
                fb.className = 'error-msg';
                return;
            }

            if (word === currentCall.Word) {
                tile.classList.add('marked');
                document.getElementById('feedback').innerText = "";
		pronounceWord(word);
                checkWin();
            } else {
                playErrorSound();
                const fb = document.getElementById('feedback');
                fb.innerText = "Wrong word! See the answer below.";
                fb.className = 'error-msg';
                // AUTO-SHOW WORD ON ERROR
                document.getElementById('reveal-area').style.display = 'block';
            }
        }

        function showHint() {
            if (!currentCall) return;
            const word = currentCall.Word;
            const first = word.charAt(0).toUpperCase();
            const length = word.length;
            const fb = document.getElementById('feedback');
            fb.innerText = `Hint: Starts with '${first}' (${length} letters)`;
            fb.className = 'hint-msg';
        }

        function pronounceWord(word) {
            const utterance = new SpeechSynthesisUtterance(word);
            utterance.rate = 0.9; // Slightly slower for clarity
            window.speechSynthesis.speak(utterance);
        }

        function checkWin() {
            if (gameWon) return;
            const size = 5;
            const marked = tiles.map(t => t.classList.contains('marked'));
            let winIndices = [];

            for (let i = 0; i < size; i++) {
                let row = [], col = [];
                for (let j = 0; j < size; j++) {
                    row.push(i * size + j);
                    col.push(j * size + i);
                }
                if (row.every(idx => marked[idx])) winIndices.push(...row);
                if (col.every(idx => marked[idx])) winIndices.push(...col);
            }
            let d1 = [0, 6, 12, 18, 24], d2 = [4, 8, 12, 16, 20];
            if (d1.every(idx => marked[idx])) winIndices.push(...d1);
            if (d2.every(idx => marked[idx])) winIndices.push(...d2);

            if (winIndices.length > 0) {
                gameWon = true;
                winIndices.forEach(idx => tiles[idx].classList.add('winning-tile'));
                playWinSound();
                //setTimeout(() => alert("BINGO! Wackadoo!"), 100);
		const overlay = document.getElementById('win-overlay');
    		overlay.style.display = 'flex'; 
            }
        }

        function nextCall() {
            initAudio();
            if (callQueue.length === 0) return alert("All board words have been called!");
            
            playRollSound();
            currentCall = callQueue.pop();
            
            document.getElementById('feedback').innerText = "";
            document.getElementById('pos-display').innerText = "(" + currentCall['Part of Speech'] + ")";
            document.getElementById('definition-display').innerText = currentCall.Definition;
            document.getElementById('reveal-word').innerText = currentCall.Word;
            document.getElementById('sentence-display').innerHTML = currentCall['Sentence Example'];
            document.getElementById('reveal-area').style.display = 'none';
        }

        function toggleReveal() {
            const area = document.getElementById('reveal-area');
            area.style.display = (area.style.display === 'none' || area.style.display === '') ? 'block' : 'none';
        }

        function resetDisplay() {
            document.getElementById('feedback').innerText = "";
            document.getElementById('pos-display').innerText = "";
            document.getElementById('definition-display').innerText = "Press 'Next Call' to start!";
            document.getElementById('reveal-area').style.display = 'none';
        }

        initGame();
    </script>
